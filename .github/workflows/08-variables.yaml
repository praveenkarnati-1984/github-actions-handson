name: 08 - Variables
on:
    push:
    workflow_dispatch:
env:
    WORKFLOW_VAR: "I am a workflow env var"
    OVERWRITTEN: "I will be overwritten"
    UNDEFINED_VAR_WITH_DEFAULT: ${{vars.UNDEFINED_VAR || 'default_vaue'}}

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: "I am a job env var"
            OVERWRITTEN: "I have been overwritten at job level"
        steps:
            - name: Print env variables
              env:
                STEP_VAR: 'I am a step env var'
                step_var2: 'I am another step env var'
                #OVERWRITTEN: "I am overwritten at step1 level"
              run: |
                echo "Step env var: ${{env.STEP_VAR}}"
                echo "Step env var 2: $step_var2"
                echo "Job env var: ${{env.JOB_VAR}}"
                echo "Job env var: ${{env.WORKFLOW_VAR}}"
                echo "Overwritten: ${{env.OVERWRITTEN}}"
            - name: Overwrite Job variable
              env:
                OVERWRITTEN: "I have been overwritten at step2 level"
              run: |
                echo "Step env var: ${{env.OVERWRITTEN}}"
    echo2:
        runs-on: ubuntu-latest
        steps:
            - name: Print variables
              run: |
                  echo "Org var: ${{vars.ORG_VAR}}"
                  echo "Overwritten Org var: ${{vars.OVERWRITTEN_VAR}}"
                  echo "Repo Var: ${{vars.REPOSITORY_VAR}}"
    echo-prod:
        runs-on: ubuntu-latest
        environment: prod
        steps:
            - name: Print prod variables
              run: |
                  echo "Org var: ${{vars.ORG_VAR}}"
                  echo "Overwritten Org var: ${{vars.OVERWRITTEN_VAR}}"
                  echo "Repo Var: ${{vars.REPOSITORY_VAR}}"
                  echo "Env var: ${{vars.TARGET_VAR}}"

    echo-undefined:
        runs-on: ubuntu-latest
        environment: prod
        steps:
            - name: Print undefined variables
              run: |
                  echo "Org var: ${{env.UNDEFINED_VAR_WITH_DEFAULT}}"
        
