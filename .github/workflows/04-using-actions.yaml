name: 04 - Using Actions
on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Printing Folders
              run: ls
            - name: Setup node
              uses: actions/setup-node@v4
              with: 
                node-version: '24.x'
            - name: Install dependencies
              run: npm ci
